<!DOCTYPE html>
<html lang="zh-CN">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>后台管理系统</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://unpkg.com/feather-icons"></script>
 <style>
  ::-webkit-scrollbar {
   width: 8px;
  }

  ::-webkit-scrollbar-track {
   background: #f1f5f9;
  }

  ::-webkit-scrollbar-thumb {
   background: #cbd5e1;
   border-radius: 4px;
  }

  .pagination-btn {
   min-width: 2.5rem;
   height: 2.5rem;
   display: flex;
   align-items: center;
   justify-content: center;
   border-radius: 0.375rem;
   border: 1px solid #e2e8f0;
   background-color: white;
   cursor: pointer;
   margin: 0 2px;
  }

  .pagination-btn:hover:not(.disabled) {
   background-color: #f1f5f9;
  }

  .pagination-btn.disabled {
   opacity: 0.5;
   cursor: not-allowed;
  }

  .pagination-btn.active {
   background-color: #3b82f6;
   color: white;
   border-color: #3b82f6;
  }

  .pagination-ellipsis {
   display: flex;
   align-items: center;
   justify-content: center;
   padding: 0 0.5rem;
  }

  /* 自定义模态弹窗样式 */
  .modal {
   display: none;
   position: fixed;
   z-index: 9999;
   left: 0;
   top: 0;
   width: 100%;
   height: 100%;
   overflow: auto;
   background-color: rgba(0,0,0,0.5);
  }

  .modal-content {
   background-color: #fefefe;
   margin: 15% auto;
   padding: 20px;
   border: 1px solid #888;
   width: 80%;
   max-width: 500px;
   border-radius: 8px;
   box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .close {
   color: #aaa;
   float: right;
   font-size: 28px;
   font-weight: bold;
   cursor: pointer;
  }

  .close:hover,
  .close:focus {
   color: black;
   text-decoration: none;
   cursor: pointer;
  }
 </style>
</head>

<body class="bg-gray-100">
<aside class="bg-gray-800 text-white w-64 fixed h-full p-4 overflow-y-auto">
 <div class="mb-8">
  <h1 class="text-xl font-bold">后台管理系统</h1>
  <p class="text-gray-400 text-sm mt-1">v2.1.0</p>
 </div>
 <nav>
  <ul class="space-y-2">
   <li>
    <a href="/" class="flex items-center p-2 hover:bg-gray-700 rounded">
     <i data-feather="home" class="w-4 h-4 mr-2"></i> 首页概览
    </a>
   </li>
   <li>
    <a href="/userList" class="flex items-center p-2 hover:bg-gray-700 rounded">
     <i data-feather="users" class="w-4 h-4 mr-2"></i> 用户管理
    </a>
   </li>
  </ul>
 </nav>
</aside>

<header class="ml-64 fixed w-[calc(100%-16rem)] bg-white shadow-sm z-10">
 <div class="flex justify-between items-center px-8 py-4">
  <h2 class="text-xl font-bold" id="pageTitle">用户管理</h2>
  <div class="flex items-center gap-4">
   <button class="p-2 hover:bg-gray-100 rounded-full">
    <i data-feather="bell"></i>
   </button>
   <div class="flex items-center gap-2">
    <img id="headerAvatar" src="/static/images/default-avatar.png" class="w-8 h-8 rounded-full cursor-pointer hover:opacity-80" onclick="openProfileModal()" title="个人主页">
    <button onclick="logout()" class="text-red-600 hover:text-red-700 flex items-center gap-1">
     <i data-feather="log-out" class="w-5 h-5"></i>
     <span class="hidden sm:inline">退出系统</span>
    </button>
   </div>
  </div>
 </div>
</header>

<main class="ml-64 pt-20 p-8">
 <div class="space-y-6">
  <div class="flex flex-col sm:flex-row justify-between gap-4">
   <div class="flex flex-col sm:flex-row gap-4">
    <div class="relative flex-[2_2_0%] min-w-[200px]">
     <input type="text" id="searchInput" placeholder="搜索用户名..."
            class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
     <i data-feather="search" class="absolute left-3 top-2.5 text-gray-400"></i>
    </div>
    <select class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 flex-1" id="statusFilter">
     <option value="">全部状态</option>
     <option value="启用">启用</option>
     <option value="禁用">禁用</option>
    </select>
   </div>
   <button onclick="openCreateUserModal()" id="create-user-button"
           class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex items-center gap-2 whitespace-nowrap">
    <i data-feather="plus"></i>
    新建用户
   </button>
  </div>

  <div class="bg-white rounded-xl shadow overflow-x-auto">
   <table class="w-full">
    <thead class="bg-gray-50">
    <tr>
     <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">用户名</th>
     <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">角色</th>
     <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">创建时间</th>
     <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">最后更新时间</th>
     <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">状态</th>
     <th class="px-6 py-3 text-left text-sm font-medium text-gray-500">操作</th>
    </tr>
    </thead>
    <tbody class="divide-y divide-gray-200" id="userTableBody">
    </tbody>
   </table>
  </div>

  <div class="flex flex-col sm:flex-row justify-between items-center px-4 py-3 bg-white rounded-xl shadow">
   <span class="text-sm text-gray-600">共 <span id="totalCount">0</span> 项</span>
   <div class="flex items-center gap-1 mt-2 sm:mt-0" id="pagination">
   </div>
  </div>

  <!-- 自定义用户详情模态弹窗 -->
  <div id="userDetailModal" class="modal">
   <div class="modal-content">
    <div class="flex justify-between items-center mb-4">
     <h2 class="text-xl font-bold">用户详情</h2>
     <span class="close" onclick="closeUserDetailModal()">&times;</span>
    </div>
    <div class="mt-4">
     <form id="userDetailForm" class="space-y-4">
      <div class="flex items-center gap-4 mb-6">
       <div class="relative">
        <img id="modalAvatar" src="/static/images/default-avatar.png" class="w-20 h-20 rounded-full">
        <input type="file" id="modalAvatarInput" class="hidden" accept="image/*" onchange="previewModalAvatar(this)">
        <button type="button" onclick="document.getElementById('modalAvatarInput').click()" id="modalAvatarEditBtn" class="absolute bottom-0 right-0 bg-white w-6 h-6 rounded-full flex items-center justify-center" style="display: none;">
         <i data-feather="edit" class="w-4 h-4 text-blue-600"></i>
        </button>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">用户名</label>
        <input type="text" id="modalUsername" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" disabled>
       </div>
      </div>
      <div>
       <label class="block text-sm font-medium text-gray-500 mb-1">邮箱</label>
       <input type="email" id="modalEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" disabled>
      </div>
      <div>
       <label class="block text-sm font-medium text-gray-500 mb-1">新密码</label>
       <input type="password" id="modalPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="留空表示不修改" disabled>
      </div>
      <div class="grid grid-cols-2 gap-4">
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">角色</label>
        <select id="modalRole" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" disabled>
         <option value="user">普通用户</option>
         <option value="admin">管理员</option>
        </select>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">状态</label>
        <select id="modalStatus" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" disabled>
         <option value="1">启用</option>
         <option value="0">禁用</option>
        </select>
       </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">创建时间</label>
        <p id="modalCreatedAt" class="text-gray-600"></p>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">最后更新时间</label>
        <p id="modalUpdatedAt" class="text-gray-600"></p>
       </div>
      </div>
      <div class="flex justify-end gap-2 mt-6" id="modalActions">
       <button type="button" onclick="closeUserDetailModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">关闭</button>
       <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" id="modalSubmitBtn" style="display: none;">保存修改</button>
      </div>
     </form>
    </div>
   </div>
  </div>

  <!-- 新建用户模态弹窗 -->
  <div id="createUserModal" class="modal">
   <div class="modal-content">
    <div class="flex justify-between items-center mb-4">
     <h2 class="text-xl font-bold">新建用户</h2>
     <span class="close" onclick="closeCreateUserModal()">&times;</span>
    </div>
    <div class="mt-4">
     <form id="createUserForm" class="space-y-4">
      <div class="flex items-center gap-4 mb-6">
       <div class="relative">
        <img id="createAvatar" src="/static/images/default-avatar.png" class="w-20 h-20 rounded-full">
        <input type="file" id="createAvatarInput" class="hidden" accept="image/*" onchange="previewCreateAvatar(this)">
        <button type="button" onclick="document.getElementById('createAvatarInput').click()" class="absolute bottom-0 right-0 bg-white w-6 h-6 rounded-full flex items-center justify-center">
         <i data-feather="edit" class="w-4 h-4 text-blue-600"></i>
        </button>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">用户名</label>
        <input type="text" id="createUsername" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
       </div>
      </div>
      <div>
       <label class="block text-sm font-medium text-gray-500 mb-1">邮箱</label>
       <input type="email" id="createEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
      </div>
      <div>
       <label class="block text-sm font-medium text-gray-500 mb-1">密码</label>
       <input type="password" id="createPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="必填" required>
      </div>
      <div class="grid grid-cols-2 gap-4">
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">角色</label>
        <select id="createRole" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
         <option value="user">普通用户</option>
         <option value="admin">管理员</option>
        </select>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">状态</label>
        <select id="createStatus" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
         <option value="1">启用</option>
         <option value="0">禁用</option>
        </select>
       </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
       <button type="button" onclick="closeCreateUserModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
       <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">创建</button>
      </div>
     </form>
    </div>
   </div>
  </div>

  <!-- 个人主页模态弹窗 -->
  <div id="profileModal" class="modal">
   <div class="modal-content">
    <div class="flex justify-between items-center mb-4">
     <h2 class="text-xl font-bold">个人主页</h2>
     <span class="close" onclick="closeProfileModal()">&times;</span>
    </div>
    <div class="mt-4">
     <form id="profileForm" class="space-y-4">
      <div class="flex items-center gap-4 mb-6">
       <div class="relative">
        <img id="profileAvatar" src="/static/images/default-avatar.png" class="w-20 h-20 rounded-full">
        <input type="file" id="profileAvatarInput" class="hidden" accept="image/*" onchange="previewProfileAvatar(this)">
        <button type="button" onclick="document.getElementById('profileAvatarInput').click()" class="absolute bottom-0 right-0 bg-white w-6 h-6 rounded-full flex items-center justify-center">
         <i data-feather="edit" class="w-4 h-4 text-blue-600"></i>
        </button>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">用户名</label>
        <input type="text" id="profileUsername" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
       </div>
      </div>
      <div>
       <label class="block text-sm font-medium text-gray-500 mb-1">邮箱</label>
       <input type="email" id="profileEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
       <label class="block text-sm font-medium text-gray-500 mb-1">新密码</label>
       <input type="password" id="profilePassword" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="留空表示不修改">
      </div>
      <div class="grid grid-cols-2 gap-4">
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">角色</label>
        <p id="profileRole" class="text-gray-600 py-2"></p>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">状态</label>
        <p id="profileStatus" class="text-gray-600 py-2"></p>
       </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">创建时间</label>
        <p id="profileCreatedAt" class="text-gray-600 py-2"></p>
       </div>
       <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">最后更新时间</label>
        <p id="profileUpdatedAt" class="text-gray-600 py-2"></p>
       </div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
       <button type="button" onclick="closeProfileModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">关闭</button>
       <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存修改</button>
      </div>
     </form>
    </div>
   </div>
  </div>

 </div>
</main>

<script src="/static/userList.js"></script>
</body>
</html>
